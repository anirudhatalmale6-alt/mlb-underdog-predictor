name: Daily MLB Picks

on:
  schedule:
    # Run at 10:30 AM ET (14:30 UTC) every day during MLB season (March-October)
    # Staggered 30min after NBA to avoid API quota conflicts
    - cron: '30 14 * 3-10 *'
  workflow_dispatch:  # Allow manual trigger

env:
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily prediction pipeline
        run: python run_daily.py

      - name: Generate picks page
        run: python generate_picks_page.py

      - name: Commit and push picks
        run: |
          git config user.name "MLB Predictor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add TODAYS_PICKS.md
          git add -f data/output/ || true
          git diff --staged --quiet || git commit -m "Daily picks for $(date +%Y-%m-%d)"
          git push
