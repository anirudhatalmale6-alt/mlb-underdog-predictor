name: Verify Lineups

on:
  schedule:
    # Run at 1:00 PM ET (17:00 UTC) every day during MLB season
    # Lineups are typically posted by 12-1 PM ET
    - cron: '0 17 * 3-10 *'
  workflow_dispatch:

jobs:
  verify-lineups:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify lineups and filter props
        run: python verify_lineups.py

      - name: Regenerate picks page
        run: python generate_picks_page.py

      - name: Commit and push updated picks
        run: |
          git config user.name "MLB Predictor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add TODAYS_PICKS.md
          git add -f data/output/ || true
          git diff --staged --quiet || git commit -m "Lineup verified picks for $(date +%Y-%m-%d)"
          git push
